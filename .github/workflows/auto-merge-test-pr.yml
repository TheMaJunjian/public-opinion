name: Auto-merge test PR to main

on:
  push:
    branches:
      - copilot/copilot-merge-test
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to merge (default: 5)'
        required: false
        default: '5'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Convert draft to ready and merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'copilot/copilot-merge-test';
            const inputPrNumber = context.payload.inputs?.pr_number;

            // Find the open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              core.setFailed('No open PR found for branch ' + branch);
              return;
            }

            const pr = prs[0];
            console.log(`Found PR #${pr.number}: ${pr.title} (draft=${pr.draft})`);

            // Convert draft -> ready for review via GraphQL
            if (pr.draft) {
              await github.graphql(`
                mutation MarkReady($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    pullRequest { id isDraft title }
                  }
                }
              `, { prId: pr.node_id });
              console.log('PR converted from draft to ready for review');
            }

            // Merge the PR (default merge method)
            const { data: mergeResult } = await github.rest.pulls.merge({
              owner, repo,
              pull_number: pr.number,
              commit_title: `Merge pull request #${pr.number}: ${pr.title}`,
              merge_method: 'merge'
            });

            console.log('Merge successful!');
            console.log('Merge SHA: ' + mergeResult.sha);
            console.log('Message: ' + mergeResult.message);

            // Delete the test branch
            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: `heads/${branch}`
              });
              console.log('Test branch deleted: ' + branch);
            } catch (e) {
              console.log('Could not delete branch (may already be gone): ' + e.message);
            }

            // Output summary
            core.summary
              .addHeading('✅ Merge Test Complete')
              .addTable([
                [{ data: 'Item', header: true }, { data: 'Value', header: true }],
                ['PR', `#${pr.number} - ${pr.title}`],
                ['PR URL', `https://github.com/${owner}/${repo}/pull/${pr.number}`],
                ['Merge Method', 'merge (standard merge commit)'],
                ['Merge Commit SHA', mergeResult.sha],
                ['Branch Deleted', branch]
              ])
              .write();
